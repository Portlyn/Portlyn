openapi: 3.0.3
info:
  title: Portlyn Admin API
  version: "1.0.0"
  description: |
    Administrative and operational API for Portlyn — a self-hosted reverse proxy
    and zero-trust control plane. All endpoints under `/api/v1` require a valid
    session cookie or `Authorization: Bearer <token>` header unless documented
    as public.
  license:
    name: TBD
servers:
  - url: https://{host}/api/v1
    variables:
      host:
        default: portlyn.example.com
        description: Your Portlyn deployment host

security:
  - bearerAuth: []
  - cookieAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    cookieAuth:
      type: apiKey
      in: cookie
      name: portlyn_session
  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            status: { type: integer }
    User:
      type: object
      properties:
        id: { type: integer }
        email: { type: string, format: email }
        role: { type: string, enum: [admin, viewer] }
        active: { type: boolean }
        mfa_enabled: { type: boolean }
        auth_provider: { type: string, enum: [local, oidc] }
        created_at: { type: string, format: date-time }
    AccessPolicy:
      type: object
      description: Nested access policy, identical shape on request and response.
      required: [access_mode]
      properties:
        access_mode: { type: string, enum: [public, authenticated, restricted] }
        allowed_roles:
          type: array
          items: { type: string }
        allowed_groups:
          type: array
          items: { type: integer }
        allowed_service_groups:
          type: array
          items: { type: integer }
    ServiceCreate:
      type: object
      description: Request body for creating/updating/upserting a service.
      required: [name, domain_id, path, target_url, tls_mode, access_policy]
      properties:
        name: { type: string, minLength: 2, maxLength: 255 }
        domain_id: { type: integer }
        subdomain: { type: string }
        path: { type: string }
        target_url:
          type: string
          format: uri
          description: Upstream target. The scheme (http/https) determines the upstream leg; tls_mode only controls the edge.
        tls_mode:
          type: string
          enum: [offload, passthrough, none]
          description: Edge TLS behavior (the browser-facing leg), NOT the upstream connection.
        pass_host_header: { type: boolean }
        upstream_skip_verify:
          type: boolean
          description: Disable upstream certificate verification. Prefer upstream_ca_pem for pinning.
        upstream_ca_pem:
          type: string
          description: PEM CA bundle to verify the upstream against (safer than upstream_skip_verify).
        upstream_server_name:
          type: string
          description: TLS ServerName to verify the upstream certificate against. Defaults to the target_url host; set this when the backend cert name differs from the dial host (e.g. when routing over the tunnel).
        access_policy: { $ref: "#/components/schemas/AccessPolicy" }
        access_method:
          type: string
          enum: ["", session, oidc_only, pin, email_code]
        node_id: { type: integer, nullable: true }
        node:
          type: string
          description: Reference a site/node by name instead of node_id (resolved server-side). Ignored if node_id is set.
    Service:
      type: object
      description: Service response. Includes the nested access_policy (mirroring the request) plus flat fields for backward compatibility and read-only derived fields.
      properties:
        id: { type: integer }
        name: { type: string }
        domain_id: { type: integer }
        subdomain: { type: string }
        hostname: { type: string, description: Fully-qualified host the service is served on }
        path: { type: string }
        target_url: { type: string, format: uri }
        tls_mode: { type: string, enum: [offload, passthrough, none] }
        tls:
          type: object
          description: Disambiguated TLS legs.
          properties:
            edge: { type: string, enum: [offload, passthrough, none] }
            upstream:
              type: object
              properties:
                scheme: { type: string, enum: ["", http, https] }
                skip_verify: { type: boolean }
                ca_pinned: { type: boolean }
                server_name: { type: string }
        pass_host_header: { type: boolean }
        upstream_skip_verify: { type: boolean }
        upstream_ca_configured: { type: boolean }
        access_policy: { $ref: "#/components/schemas/AccessPolicy" }
        access_mode: { type: string, enum: [public, authenticated, restricted] }
        access_method:
          type: string
          enum: ["", session, oidc_only, pin, email_code]
        risk_score: { type: string, enum: [low, medium, high] }
        risk_reasons:
          type: array
          items: { type: string }
        active_cert_source:
          type: string
          enum: [managed, static, bootstrap, none]
          description: Which certificate the edge actually serves for this host. `bootstrap` means only the short-lived self-signed cert is present.
        active_cert_issuer: { type: string }
        active_cert_expires: { type: string, format: date-time, nullable: true }
        active_cert_is_bootstrap: { type: boolean }
        active_cert_days_remaining: { type: integer }
        service_status: { type: string, enum: [pending, healthy, unhealthy] }
        node_id:
          type: integer
          nullable: true
          description: If set, traffic to this service is routed via the WireGuard tunnel to this node
        allowed_countries:
          type: array
          items: { type: string, minLength: 2, maxLength: 2 }
        blocked_countries:
          type: array
          items: { type: string, minLength: 2, maxLength: 2 }
        ip_allowlist:
          type: array
          items: { type: string }
        ip_blocklist:
          type: array
          items: { type: string }
    Domain:
      type: object
      properties:
        id: { type: integer }
        name: { type: string, description: FQDN; unique key used by PUT upsert }
        type: { type: string, enum: [root, subdomain] }
        provider: { type: string }
        notes: { type: string }
        ip_allowlist: { type: array, items: { type: string } }
        ip_blocklist: { type: array, items: { type: string } }
    DomainCreate:
      type: object
      required: [name, type]
      properties:
        name: { type: string }
        type: { type: string, enum: [root, subdomain] }
        provider: { type: string }
        notes: { type: string }
        ip_allowlist: { type: array, items: { type: string } }
        ip_blocklist: { type: array, items: { type: string } }
        auto_certificate:
          type: boolean
          default: true
          description: When true (default) and a single active DNS provider exists, a dns-01 Let's Encrypt certificate is requested automatically. The created certificate id is returned in the X-Portlyn-Auto-Certificate-Id response header.
        dns_provider_id:
          type: integer
          description: Explicit DNS provider to use for auto-issuance instead of auto-selecting.
    Certificate:
      type: object
      properties:
        id: { type: integer }
        domain_id: { type: integer }
        primary_domain: { type: string }
        type: { type: string, enum: [single, wildcard, multi_san] }
        status: { type: string, enum: [pending, issued, failed, expiring_soon, renewing] }
        last_error: { type: string }
        challenge_type: { type: string, enum: [http-01, dns-01] }
        issuer: { type: string, enum: [letsencrypt_prod, letsencrypt_staging] }
        issued_at: { type: string, format: date-time, nullable: true }
        expires_at: { type: string, format: date-time }
        next_renewal_at: { type: string, format: date-time, nullable: true }
        is_auto_renew: { type: boolean }
        dns_provider_id: { type: integer, nullable: true }
    CertificateCreate:
      type: object
      required: [domain_id, type, challenge_type, issuer]
      properties:
        domain_id: { type: integer }
        type: { type: string, enum: [single, wildcard, multi_san] }
        challenge_type: { type: string, enum: [http-01, dns-01] }
        issuer: { type: string, enum: [letsencrypt_prod, letsencrypt_staging] }
        primary_domain: { type: string }
        sans: { type: array, items: { type: string } }
        is_auto_renew: { type: boolean }
        renewal_window_days: { type: integer, minimum: 7, maximum: 90 }
        dns_provider_id: { type: integer }
    DNSProvider:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        type: { type: string, enum: [cloudflare, hetzner, route53, digitalocean] }
        is_active: { type: boolean }
        config_hint: { type: string }
        has_stored_secret: { type: boolean }
        last_test_status: { type: string }
        supported_challenges: { type: array, items: { type: string } }
    DNSProviderCreate:
      type: object
      required: [name, type]
      properties:
        name: { type: string }
        type: { type: string, enum: [cloudflare, hetzner, route53, digitalocean] }
        is_active: { type: boolean }
        config:
          type: object
          additionalProperties: { type: string }
          description: Provider credentials (e.g. api_token). Stored encrypted, never returned.
    Node:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        status: { type: string, enum: [unknown, online, offline] }
        wg_public_key: { type: string }
        wg_tunnel_ip: { type: string }
        wg_endpoint: { type: string }
        tunnel_status:
          type: string
          enum: [inactive, provisioned, connected, stale]
    TunnelBootstrapResponse:
      type: object
      properties:
        node_id: { type: integer }
        public_key: { type: string }
        private_key:
          type: string
          description: Shown only once. Store it on the agent side immediately.
        address: { type: string }
        server_public_key: { type: string }
        server_endpoint: { type: string }
        allowed_ips:
          type: array
          items: { type: string }
        config_text:
          type: string
          description: A ready-to-paste wg-quick config
    ExposureReport:
      type: object
      properties:
        service_id: { type: integer }
        score: { type: integer, minimum: 0, maximum: 100 }
        checked_at: { type: string, format: date-time }
        dns_resolvable: { type: boolean }
        https_valid: { type: boolean }
        https_expires_in_days: { type: integer }
        http_to_https_redirect: { type: boolean }
        hsts_present: { type: boolean }
        csp_present: { type: boolean }
        x_frame_options: { type: boolean }
        auth_enforced: { type: boolean }
        findings:
          type: array
          items: { type: string }
    AuditWebhook:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        url: { type: string, format: uri }
        format: { type: string, enum: [generic, slack, discord, ntfy] }
        event_types:
          type: array
          items: { type: string }
        active: { type: boolean }
        last_status: { type: integer }
        last_fired_at: { type: string, format: date-time, nullable: true }
    UserCredential:
      type: object
      properties:
        id: { type: integer }
        label: { type: string }
        credential_id: { type: string }
        sign_count: { type: integer }
        user_verified: { type: boolean }
        created_at: { type: string, format: date-time }
        last_used_at: { type: string, format: date-time, nullable: true }
    MagicLinkResponse:
      type: object
      properties:
        url: { type: string, format: uri }
        token: { type: string }
        expires_at: { type: string, format: date-time }

paths:
  /auth/login:
    post:
      summary: Email + password login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
      responses:
        "200":
          description: Session issued
        "401": { description: Invalid credentials, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "429": { description: Rate limited }

  /auth/oidc/start:
    get:
      summary: Begin OIDC login redirect
      security: []
      responses:
        "302": { description: Redirect to identity provider }

  /me:
    get:
      summary: Current user profile
      responses:
        "200": { description: Profile, content: { application/json: { schema: { $ref: "#/components/schemas/User" } } } }

  /me/passkeys:
    get:
      summary: List registered passkeys for the current user
      responses:
        "200":
          description: List
          content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/UserCredential" } } } }

  /me/passkeys/begin-registration:
    post:
      summary: Begin WebAuthn credential registration
      responses:
        "200":
          description: Challenge options
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id: { type: string }
                  options: { type: object }
                  expires_at: { type: string, format: date-time }

  /me/passkeys/finish-registration:
    post:
      summary: Finalize WebAuthn registration
      parameters:
        - in: query
          name: session_id
          required: true
          schema: { type: string }
        - in: query
          name: label
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Attestation response from navigator.credentials.create()
      responses:
        "201":
          description: Credential stored
          content: { application/json: { schema: { $ref: "#/components/schemas/UserCredential" } } }

  /services:
    get:
      summary: List services
      responses:
        "200":
          description: List
          content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Service" } } } }
    post:
      summary: Create service (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ServiceCreate" }
      responses:
        "201":
          description: Created
          content: { application/json: { schema: { $ref: "#/components/schemas/Service" } } }
    put:
      summary: Upsert service by route (admin only)
      description: Idempotent apply keyed on (domain_id, subdomain, path). Creates when absent, updates in place when present — a repeated apply is a no-op update, not a conflict.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ServiceCreate" }
      responses:
        "200": { description: Updated existing service, content: { application/json: { schema: { $ref: "#/components/schemas/Service" } } } }
        "201": { description: Created new service, content: { application/json: { schema: { $ref: "#/components/schemas/Service" } } } }

  /services/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    get:
      summary: Get service
      responses:
        "200": { description: Service, content: { application/json: { schema: { $ref: "#/components/schemas/Service" } } } }
    patch:
      summary: Update service
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/Service" } } }
      responses:
        "200": { description: Updated }
    delete:
      summary: Delete service
      responses:
        "204": { description: Deleted }

  /services/{id}/magic-link:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    post:
      summary: Issue a single-use magic-link URL for temporary access
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ttl_seconds: { type: integer, minimum: 60, maximum: 2592000 }
                label: { type: string }
      responses:
        "201":
          description: Magic link
          content: { application/json: { schema: { $ref: "#/components/schemas/MagicLinkResponse" } } }

  /services/{id}/last-denials:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    get:
      summary: List the last N denial events for a service
      responses:
        "200": { description: List of denial events }

  /services/{id}/explain:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    post:
      summary: Simulate a request and explain each step
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user_email: { type: string, format: email }
                client_ip: { type: string }
                time: { type: string, format: date-time }
      responses:
        "200": { description: Explanation }

  /services/{id}/exposure-scan:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    post:
      summary: Trigger an immediate exposure scan for a service
      responses:
        "200": { description: Report, content: { application/json: { schema: { $ref: "#/components/schemas/ExposureReport" } } } }

  /exposure-reports:
    get:
      summary: List exposure reports across all services
      responses:
        "200": { description: List }

  /exposure-reports/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    get:
      summary: Get exposure report for a service
      responses:
        "200": { description: Report, content: { application/json: { schema: { $ref: "#/components/schemas/ExposureReport" } } } }

  /tunnel/settings:
    get:
      summary: Read tunnel server settings
      responses:
        "200": { description: Settings }
    patch:
      summary: Update tunnel server settings (and start/stop the server)
      responses:
        "200": { description: Updated }

  /nodes/{id}/wg-bootstrap:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    post:
      summary: Generate a fresh WireGuard keypair and bind a tunnel IP to a node
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                force_reissue: { type: boolean }
                allowed_ips: { type: array, items: { type: string } }
      responses:
        "200":
          description: Client config bundle
          content: { application/json: { schema: { $ref: "#/components/schemas/TunnelBootstrapResponse" } } }
        "409": { description: Node already provisioned (pass force_reissue=true to override) }

  /nodes/{id}/wg-tunnel:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    delete:
      summary: Revoke a node's tunnel assignment
      responses:
        "204": { description: Revoked }

  /audit-webhooks:
    get:
      summary: List configured webhooks
      responses:
        "200": { description: List, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/AuditWebhook" } } } } }
    post:
      summary: Create webhook
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/AuditWebhook" } } }
      responses:
        "201":
          description: Created (response includes one-time `secret`)

  /audit-webhooks/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    patch:
      summary: Update webhook
      responses:
        "200": { description: Updated }
    delete:
      summary: Delete webhook
      responses:
        "204": { description: Deleted }

  /audit-logs:
    get:
      summary: List audit log entries (hash-chained)
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 50, maximum: 500 }
        - in: query
          name: offset
          schema: { type: integer }
      responses:
        "200": { description: List }

  /system/overview:
    get:
      summary: System overview, health, counts and warnings
      responses:
        "200": { description: Overview }

  /domains:
    get:
      summary: List domains (admin only)
      responses:
        "200": { description: List, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Domain" } } } } }
    post:
      summary: Create domain (admin only)
      description: When auto_certificate is true (default) and a single active DNS provider exists, a dns-01 certificate is requested automatically; its id is returned in the X-Portlyn-Auto-Certificate-Id header.
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/DomainCreate" } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Domain" } } } }
    put:
      summary: Upsert domain by FQDN (admin only)
      description: Idempotent apply keyed on the domain name. Creates when absent, updates in place when present.
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/DomainCreate" } } }
      responses:
        "200": { description: Updated, content: { application/json: { schema: { $ref: "#/components/schemas/Domain" } } } }
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Domain" } } } }

  /domains/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    get:
      summary: Get domain
      responses:
        "200": { description: Domain, content: { application/json: { schema: { $ref: "#/components/schemas/Domain" } } } }
    patch:
      summary: Update domain
      responses:
        "200": { description: Updated }
    delete:
      summary: Delete domain
      responses:
        "204": { description: Deleted }

  /certificates:
    get:
      summary: List certificates (admin only)
      responses:
        "200": { description: List, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Certificate" } } } } }
    post:
      summary: Create certificate (admin only)
      parameters:
        - in: query
          name: sync
          schema: { type: boolean }
          description: When true, issue synchronously and return the terminal status instead of leaving it pending for the background worker.
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CertificateCreate" } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Certificate" } } } }

  /certificates/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    get:
      summary: Get certificate
      responses:
        "200": { description: Certificate, content: { application/json: { schema: { $ref: "#/components/schemas/Certificate" } } } }
    patch:
      summary: Update certificate
      responses:
        "200": { description: Updated }
    delete:
      summary: Delete certificate
      responses:
        "204": { description: Deleted }

  /certificates/{id}/retry:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    post:
      summary: Retry issuance for a failed certificate (synchronous)
      responses:
        "200": { description: Certificate, content: { application/json: { schema: { $ref: "#/components/schemas/Certificate" } } } }

  /certificates/{id}/renew:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    post:
      summary: Force renewal (synchronous)
      responses:
        "200": { description: Certificate, content: { application/json: { schema: { $ref: "#/components/schemas/Certificate" } } } }

  /certificates/{id}/sync-status:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    post:
      summary: Reconcile and return current certificate status
      responses:
        "200": { description: Certificate, content: { application/json: { schema: { $ref: "#/components/schemas/Certificate" } } } }

  /dns-providers:
    get:
      summary: List DNS providers (admin only)
      responses:
        "200": { description: List, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/DNSProvider" } } } } }
    post:
      summary: Create DNS provider (admin only)
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/DNSProviderCreate" } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/DNSProvider" } } } }

  /dns-providers/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    get:
      summary: Get DNS provider
      responses:
        "200": { description: DNS provider, content: { application/json: { schema: { $ref: "#/components/schemas/DNSProvider" } } } }
    patch:
      summary: Update DNS provider
      responses:
        "200": { description: Updated }
    delete:
      summary: Delete DNS provider
      responses:
        "204": { description: Deleted }

  /dns-providers/{id}/test:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    post:
      summary: Test DNS provider credentials
      responses:
        "200": { description: Test result }
