# CrowdSec acquisition for Portlyn.
#
# Heads up: the journalctl datasource hands the parser a line WITH the syslog
# prefix ("Jul 16 host portlyn[pid]: {json}"), not the bare JSON. The Portlyn
# parser strips that back to valid JSON, so this works, but `cscli explain`
# feeds clean JSON and won't show the prefix. Test against a live feed.
#
# Copy to /etc/crowdsec/acquis.d/portlyn.yaml and restart crowdsec.
source: journalctl
journalctl_filter:
  - "_SYSTEMD_UNIT=portlyn.service"
labels:
  type: portlyn
---
# Alternative: read a plain-JSON file instead (Docker, or Portlyn pointed at a
# log file). No syslog prefix, so the parser's strip is simply a no-op.
# source: file
# filenames:
#   - /var/log/portlyn/portlyn.log
# labels:
#   type: portlyn
